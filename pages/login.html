<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/login.css" />

    <title>Login | EcoViva</title>
  </head>

  <body class="auth-page">
    <div id="header"></div>

    <main class="login-page">
      <section class="login-section">
        <div class="container">
          <div class="login-wrapper">
            <div class="login-card">
              <div class="login-avatar">
                <img
                  src="/assets/cadastro_login/icons/user.png"
                  alt="Ícone de usuário"
                />
              </div>

              <form class="login-form" id="loginForm">
                <div class="form-group">
                  <label for="email">E-mail</label>
                  <div class="input-with-icon">
                    <span class="input-icon">
                      <img
                        src="/assets/cadastro_login/icons/mail-icon.png"
                        alt="Ícone de e-mail"
                      />
                    </span>
                    <input
                      type="email"
                      id="email"
                      name="email"
                      placeholder="Insira seu e-mail"
                    />
                  </div>
                </div>

                <div class="form-group">
                  <label for="password">Senha</label>
                  <div class="input-with-icon input-password">
                    <span class="input-icon">
                      <img
                        src="/assets/cadastro_login/icons/icon-lock.png"
                        alt="Ícone de cadeado"
                      />
                    </span>
                    <input
                      type="password"
                      id="password"
                      name="password"
                      placeholder="Insira sua senha"
                    />
                  </div>
                </div>

                <div class="login-options">
                  <label class="remember-me">
                    <input type="checkbox" name="remember" />
                    <span>Manter conectado</span>
                  </label>

                  <a href="#" class="forgot-password">esqueci minha senha</a>
                </div>

                <button type="submit" class="login-button">Entrar</button>

                <div class="divider">
                  <span>Ou</span>
                </div>

                <p class="signup-link">
                  Não tem uma conta?
                  <a href="../pages/cadastro.html">Cadastre-se</a>
                </p>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer"></div>

    <script src="../js/include.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
